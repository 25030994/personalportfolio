<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - KHODANI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #2c3e50;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #34495e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display input {
            background: transparent;
            border: none;
            outline: none;
            font-size: 2.5rem;
            color: #ecf0f1;
            text-align: right;
            width: 100%;
            font-family: 'Courier New', monospace;
        }

        .display .previous {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #34495e;
            color: #ecf0f1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .operator {
            background: #e74c3c;
            color: white;
        }

        .operator:hover {
            background: #c0392b;
        }

        .equals {
            background: #27ae60;
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background: #229954;
        }

        .clear {
            background: #f39c12;
            color: white;
        }

        .clear:hover {
            background: #e67e22;
        }

        .zero {
            grid-column: span 2;
        }

        .title {
            text-align: center;
            color: #ecf0f1;
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .calculator {
                padding: 20px;
                max-width: 350px;
            }

            .display input {
                font-size: 2rem;
            }

            button {
                padding: 15px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">KHODANI's Calculator</div>
        <div class="display">
            <div class="previous"></div>
            <input type="text" id="display" readonly>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>

            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">−</button>

            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>

            <button class="zero" onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let previous = document.querySelector('.previous');
        let currentInput = '';
        let operator = '';
        let previousValue = '';

        function appendToDisplay(value) {
            if (['+', '-', '*', '/'].includes(value)) {
                if (currentInput !== '') {
                    if (previousValue !== '' && operator !== '') {
                        calculate();
                    }
                    operator = value;
                    previousValue = currentInput;
                    previous.textContent = previousValue + ' ' + operator;
                    currentInput = '';
                }
            } else {
                currentInput += value;
                display.value = currentInput;
            }
        }

        function calculate() {
            if (previousValue !== '' && currentInput !== '' && operator !== '') {
                let result;
                const prev = parseFloat(previousValue);
                const current = parseFloat(currentInput);

                switch (operator) {
                    case '+':
                        result = prev + current;
                        break;
                    case '-':
                        result = prev - current;
                        break;
                    case '*':
                        result = prev * current;
                        break;
                    case '/':
                        if (current === 0) {
                            alert('Cannot divide by zero!');
                            clearDisplay();
                            return;
                        }
                        result = prev / current;
                        break;
                    default:
                        return;
                }

                // Handle decimal places
                result = Math.round(result * 1000000000) / 1000000000;

                display.value = result;
                previous.textContent = previousValue + ' ' + operator + ' ' + currentInput + ' =';
                currentInput = result.toString();
                operator = '';
                previousValue = '';
            }
        }

        function clearDisplay() {
            display.value = '';
            previous.textContent = '';
            currentInput = '';
            operator = '';
            previousValue = '';
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            display.value = currentInput;
        }

        // Keyboard support
        document.addEventListener('keydown', function(event) {
            const key = event.key;

            if (key >= '0' && key <= '9') {
                appendToDisplay(key);
            } else if (key === '.') {
                appendToDisplay('.');
            } else if (['+', '-', '*', '/'].includes(key)) {
                appendToDisplay(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });

        // Initialize display
        clearDisplay();
    </script>
</body>
</html>
