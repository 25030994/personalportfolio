<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Real‑time Currency Converter | Live Exchange Rates</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    
    .converter-card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    
    .card-header {
      background: #1e2a3e;
      padding: 1.5rem 2rem;
      color: white;
      text-align: center;
    }

    .card-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .card-header h1 span {
      background: #f39c12;
      font-size: 1.1rem;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      font-weight: 500;
      color: #1e2a3e;
    }

    .sub {
      font-size: 0.85rem;
      margin-top: 0.6rem;
      opacity: 0.8;
      font-weight: 400;
    }

    
    .converter-body {
      padding: 2rem 2rem 2rem 2rem;
    }

    
    .amount-section {
      margin-bottom: 2rem;
    }

    .label-icon {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: #1f2d3d;
      margin-bottom: 0.6rem;
      font-size: 0.95rem;
    }

    .amount-input-wrapper {
      background: #f1f5f9;
      border-radius: 1.8rem;
      padding: 0.2rem 0.2rem 0.2rem 1.5rem;
      display: flex;
      align-items: center;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }

    .amount-input-wrapper:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
      background: white;
    }

    .currency-symbol-prefix {
      font-size: 1.4rem;
      font-weight: 500;
      color: #334155;
      margin-right: 0.5rem;
    }

    #amount {
      width: 100%;
      padding: 1rem 0.8rem 1rem 0;
      font-size: 1.5rem;
      font-weight: 600;
      background: transparent;
      border: none;
      outline: none;
      color: #0f172a;
    }

    #amount::placeholder {
      color: #94a3b8;
      font-weight: 400;
      font-size: 1.2rem;
    }

    
    .currency-pair {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 2rem;
      justify-content: space-between;
    }

    .currency-box {
      flex: 1;
      min-width: 170px;
      background: #f8fafc;
      border-radius: 1.5rem;
      padding: 1rem 1.2rem;
      border: 1px solid #e2edf2;
      transition: all 0.2s;
    }

    .currency-box label {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      color: #5b6e8c;
      display: block;
      margin-bottom: 0.6rem;
    }

    select {
      width: 100%;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 1.2rem;
      padding: 0.7rem 0.8rem;
      font-size: 1rem;
      font-weight: 500;
      color: #0c1b2f;
      cursor: pointer;
      outline: none;
      transition: 0.1s;
    }

    select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px #bfdbfe;
    }

    
    .swap-area {
      display: flex;
      justify-content: center;
      margin: 0.2rem 0 1rem 0;
    }

    .swap-btn {
      background: #ffffff;
      border: 1px solid #cbd5e6;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #1e293b;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }

    .swap-btn:hover {
      background: #f1f5f9;
      border-color: #3b82f6;
      transform: scale(0.97);
    }

    
    .result-panel {
      background: linear-gradient(115deg, #0f172a 0%, #1e293b 100%);
      border-radius: 1.8rem;
      padding: 1.5rem 1.8rem;
      margin: 1rem 0 1.5rem 0;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .conversion-rate {
      color: #a5b4fc;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      margin-bottom: 0.5rem;
    }

    .converted-value {
      font-size: 2.4rem;
      font-weight: 800;
      color: white;
      word-break: break-word;
      line-height: 1.2;
    }

    .converted-value small {
      font-size: 1rem;
      font-weight: 400;
      color: #cbd5e6;
    }

    .original-amount-ref {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    
    .rate-footer {
      margin-top: 1rem;
      font-size: 0.7rem;
      background: #eef2ff;
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .last-update {
      font-family: monospace;
      background: #e2e8f0;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
    }

    .error-message {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 0.4rem;
      font-weight: 500;
    }

    button, select, input {
      user-select: none;
    }

    @media (max-width: 550px) {
      .converter-body {
        padding: 1.5rem;
      }
      .converted-value {
        font-size: 1.7rem;
      }
      .currency-pair {
        flex-direction: column;
        gap: 0.8rem;
      }
    }

    
    .currency-emoji {
      display: inline-block;
      margin-right: 6px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div class="converter-card">
  <div class="card-header">
    <h1>
      💱 Currency Converter 
      <span>live</span>
    </h1>
    <div class="sub">Real exchange rates — accurate & instant conversion</div>
  </div>

  <div class="converter-body">
    <!-- Amount input -->
    <div class="amount-section">
      <div class="label-icon">
        💵 Amount
      </div>
      <div class="amount-input-wrapper">
        <span class="currency-symbol-prefix" id="amountPrefix">$</span>
        <input type="number" id="amount" value="100.00" step="any" placeholder="0.00">
      </div>
      <div id="amountError" class="error-message"></div>
    </div>

    
    <div class="currency-pair">
      <div class="currency-box">
        <label>🔄 FROM</label>
        <select id="fromCurrency"></select>
      </div>
      <div class="currency-box">
        <label>🎯 TO</label>
        <select id="toCurrency"></select>
      </div>
    </div>

    
    <div class="swap-area">
      <button class="swap-btn" id="swapBtn">⟳ Swap currencies</button>
    </div>

    
    <div class="result-panel" id="resultPanel">
      <div class="conversion-rate" id="rateDisplay">1 USD = 0.00 EUR</div>
      <div class="converted-value" id="convertedAmount">0.00</div>
      <div class="original-amount-ref" id="originalRef">—</div>
    </div>

    
    <div class="rate-footer">
      <span>📡 Exchange rates provided by <strong>KHODANI(ECB)</strong></span>
      <span class="last-update" id="updateTime">updating...</span>
    </div>
    <div id="globalError" class="error-message" style="text-align: center; margin-top: 0.8rem;"></div>
  </div>
</div>

<script>
  

  const currencyList = [
    { code: "USD", name: "US Dollar", symbol: "$", flag: "🇺🇸" },
    { code: "EUR", name: "Euro", symbol: "€", flag: "🇪🇺" },
    { code: "GBP", name: "British Pound", symbol: "£", flag: "🇬🇧" },
    { code: "JPY", name: "Japanese Yen", symbol: "¥", flag: "🇯🇵" },
    { code: "CAD", name: "Canadian Dollar", symbol: "C$", flag: "🇨🇦" },
    { code: "AUD", name: "Australian Dollar", symbol: "A$", flag: "🇦🇺" },
    { code: "CHF", name: "Swiss Franc", symbol: "CHF", flag: "🇨🇭" },
    { code: "CNY", name: "Chinese Yuan", symbol: "¥", flag: "🇨🇳" },
    { code: "INR", name: "Indian Rupee", symbol: "₹", flag: "🇮🇳" },
    { code: "BRL", name: "Brazilian Real", symbol: "R$", flag: "🇧🇷" },
    { code: "KRW", name: "South Korean Won", symbol: "₩", flag: "🇰🇷" },
    { code: "MXN", name: "Mexican Peso", symbol: "MX$", flag: "🇲🇽" },
    { code: "SGD", name: "Singapore Dollar", symbol: "S$", flag: "🇸🇬" },
    { code: "NZD", name: "New Zealand Dollar", symbol: "NZ$", flag: "🇳🇿" },
    { code: "SEK", name: "Swedish Krona", symbol: "kr", flag: "🇸🇪" },
    { code: "TRY", name: "Turkish Lira", symbol: "₺", flag: "🇹🇷" },
    { code: "ZAR", name: "South African Rand", symbol: "R", flag: "🇿🇦" },
    { code: "AED", name: "Dirham", symbol: "د.إ", flag: "🇦🇪" }
  ];

  
  let exchangeRates = null;        
  let lastFetchTimestamp = null;
  let isFetching = false;
  let currentFrom = "USD";
  let currentTo = "EUR";


  const fromSelect = document.getElementById("fromCurrency");
  const toSelect = document.getElementById("toCurrency");
  const amountInput = document.getElementById("amount");
  const convertedSpan = document.getElementById("convertedAmount");
  const rateDisplaySpan = document.getElementById("rateDisplay");
  const originalRefSpan = document.getElementById("originalRef");
  const updateTimeSpan = document.getElementById("updateTime");
  const amountPrefixSpan = document.getElementById("amountPrefix");
  const amountErrorDiv = document.getElementById("amountError");
  const globalErrorDiv = document.getElementById("globalError");
  const swapBtn = document.getElementById("swapBtn");

  
  function populateCurrencySelects() {
    
    fromSelect.innerHTML = "";
    toSelect.innerHTML = "";

    currencyList.forEach(currency => {
      const optionFrom = document.createElement("option");
      optionFrom.value = currency.code;
      optionFrom.textContent = `${currency.flag} ${currency.code} - ${currency.name}`;
      if (currency.code === currentFrom) optionFrom.selected = true;
      fromSelect.appendChild(optionFrom);

      const optionTo = document.createElement("option");
      optionTo.value = currency.code;
      optionTo.textContent = `${currency.flag} ${currency.code} - ${currency.name}`;
      if (currency.code === currentTo) optionTo.selected = true;
      toSelect.appendChild(optionTo);
    });
  }

  
  function updateAmountSymbol() {
    const selectedCode = fromSelect.value;
    const found = currencyList.find(c => c.code === selectedCode);
    if (found) {
      amountPrefixSpan.textContent = found.symbol + " ";
    } else {
      amountPrefixSpan.textContent = selectedCode + " ";
    }
  }


  async function fetchExchangeRates() {
    if (isFetching) return false;
    isFetching = true;
    globalErrorDiv.textContent = "";
    try {
      
      const response = await fetch("https://api.khodani.app/latest?from=EUR");
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (data && data.rates) {
        exchangeRates = data.rates;
        
        exchangeRates["EUR"] = 1.0;
        lastFetchTimestamp = new Date();
        updateTimeSpan.textContent = `updated: ${lastFetchTimestamp.toLocaleTimeString()}`;
        isFetching = false;
        return true;
      } else {
        throw new Error("Invalid rates data");
      }
    } catch (err) {
      console.warn("Fetch error: ", err);
      globalErrorDiv.textContent = "⚠️ Could not fetch live rates. Using fallback demo rates (approx).";
      
      exchangeRates = {
        "USD": 1.085, "EUR": 1.0, "GBP": 0.857, "JPY": 169.2, "CAD": 1.482,
        "AUD": 1.626, "CHF": 0.942, "CNY": 7.849, "INR": 90.48, "BRL": 5.523,
        "KRW": 1482.5, "MXN": 18.24, "SGD": 1.456, "NZD": 1.775, "SEK": 11.423,
        "TRY": 35.12, "ZAR": 19.88, "AED": 3.985
      };
      lastFetchTimestamp = new Date();
      updateTimeSpan.textContent = `fallback mode ${lastFetchTimestamp.toLocaleTimeString()}`;
      isFetching = false;
      return true;
    }
  }

  
  function getConversionRate(fromCode, toCode) {
    if (!exchangeRates) return null;
    
    const rateFromEur = exchangeRates[fromCode];
    const rateToEur = exchangeRates[toCode];
    if (rateFromEur === undefined || rateToEur === undefined) return null;
    return rateToEur / rateFromEur;
  }

  
  async function convertCurrency() {
    
    if (!exchangeRates) {
      const success = await fetchExchangeRates();
      if (!success) {
        globalErrorDiv.textContent = "Error loading exchange data.";
        return;
      }
    }

    
    let amountValue = parseFloat(amountInput.value);
    if (isNaN(amountValue)) {
      amountErrorDiv.textContent = "Please enter a valid number";
      amountValue = 0;
    } else {
      amountErrorDiv.textContent = "";
    }

    const fromCurrency = fromSelect.value;
    const toCurrency = toSelect.value;

    
    updateAmountSymbol();

    const rate = getConversionRate(fromCurrency, toCurrency);
    if (rate === null) {
      convertedSpan.innerHTML = "⚠️ Rate unavailable";
      rateDisplaySpan.textContent = `${fromCurrency} → ${toCurrency} : conversion error`;
      originalRefSpan.textContent = `—`;
      return;
    }

    const converted = amountValue * rate;
    
    let formattedConverted;
    if (toCurrency === "JPY" || toCurrency === "KRW") {
      formattedConverted = Math.round(converted).toLocaleString(undefined, { maximumFractionDigits: 0 });
    } else {
      formattedConverted = converted.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    }

    
    const fromSymbol = currencyList.find(c => c.code === fromCurrency)?.symbol || fromCurrency;
    const toSymbol = currencyList.find(c => c.code === toCurrency)?.symbol || toCurrency;
    
    
    convertedSpan.innerHTML = `${toSymbol} ${formattedConverted}`;
    
    
    const inverseRate = rate;
    const rateFormatted = inverseRate.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 6 });
    rateDisplaySpan.innerHTML = `1 ${fromCurrency} = ${rateFormatted} ${toCurrency}`;

    
    const originalAmountFormatted = amountValue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    originalRefSpan.innerHTML = `${fromSymbol} ${originalAmountFormatted} ${fromCurrency} → ${toSymbol} ${formattedConverted} ${toCurrency}`;
  }

  
  function swapCurrencies() {
    const fromVal = fromSelect.value;
    const toVal = toSelect.value;
    fromSelect.value = toVal;
    toSelect.value = fromVal;
    // update stored current variables
    currentFrom = fromSelect.value;
    currentTo = toSelect.value;
    updateAmountSymbol();
    convertCurrency(); 
  }

  
  async function refreshRatesAndConvert() {
    
    exchangeRates = null;
    globalErrorDiv.textContent = "";
    const success = await fetchExchangeRates();
    if (success) {
      convertCurrency();
    } else {
      convertCurrency(); 
    }
  }

  async function init() {
    populateCurrencySelects();
  
    currentFrom = "USD";
    currentTo = "EUR";
    fromSelect.value = currentFrom;
    toSelect.value = currentTo;
    updateAmountSymbol();
    
    await fetchExchangeRates();
    await convertCurrency();
    
    
    fromSelect.addEventListener("change", () => {
      currentFrom = fromSelect.value;
      updateAmountSymbol();
      convertCurrency();
    });
    toSelect.addEventListener("change", () => {
      currentTo = toSelect.value;
      convertCurrency();
    });
    amountInput.addEventListener("input", () => convertCurrency());
    swapBtn.addEventListener("click", () => swapCurrencies());
    
    
    setInterval(async () => {
      
      await refreshRatesAndConvert();
    }, 10 * 60 * 1000);
    
    
    amountInput.addEventListener("wheel", (e) => e.preventDefault()); 
  }
  
  init();
</script>
</body>
</html>
